<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>야르 - 소셜</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="page-container">

    <div class="page-header">
      <div>
        <p class="page-title">소셜</p>
        <p class="page-subtitle">친구들과 수익률을 비교해보세요</p>
      </div>
    </div>

    <div class="social-grid">

      <!-- 왼쪽: 친구 추가 / 요청 / 목록 -->
      <div class="social-left">

        <div class="card">
          <p class="card-title">친구 추가</p>
          <div class="friend-add-row">
            <input type="text" id="friendIdInput" placeholder="친구의 아이디를 입력하세요" />
            <button class="btn-primary" id="addFriendBtn">추가하기</button>
          </div>
        </div>

        <div class="card highlight-card" id="friendRequestCard" hidden>
          <p class="request-text" id="requestText">00님이 친구 요청을 보냈어요</p>
          <div class="request-actions">
            <button class="btn-primary btn-sm" id="acceptBtn">수락</button>
            <button class="btn-secondary btn-sm" id="rejectBtn">거절</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title-row">
            <p class="card-title">친구 목록</p>
            <span class="card-count" id="friendCount">0명</span>
          </div>
          <div id="friendList">
            <!-- 친구 목록: JS에서 API 응답으로 이 안을 채움 -->
          </div>
        </div>
      </div>

      <!-- 가운데: 친구 랭킹 -->
      <div class="card">
        <div class="card-title-row">
          <p class="card-title">친구 랭킹</p>
          <span class="card-caption">오늘 수익률 기준</span>
        </div>
        <div id="friendRanking">
          <!-- 친구 랭킹: JS에서 채움 -->
        </div>
      </div>

      <!-- 오른쪽: 전체 유저 랭킹 -->
      <div class="card">
        <div class="card-title-row">
          <p class="card-title">전체 랭킹</p>
          <span class="card-caption">오늘 수익률 기준</span>
        </div>
        <div id="globalRanking">
          <!-- 전체 랭킹: JS에서 채움 -->
        </div>
      </div>

    </div>
  </main>

  <script src="js/navbar.js"></script>
  <script src="js/social.js"></script>
</body>
</html>
