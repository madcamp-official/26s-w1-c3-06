<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>모의투자 - 설정</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="page-container settings-container">

    <div class="page-header">
      <div>
        <p class="page-title">설정</p>
        <p class="page-subtitle">내 계정 정보를 확인하고 관리해요</p>
      </div>
    </div>

    <!-- 프로필 카드 -->
    <div class="card profile-card">
      <img class="profile-avatar" id="profileAvatar" src="https://placehold.co/96x96" alt="프로필 사진" />
      <div>
        <p class="profile-name" id="profileName">김혜리</p>
        <p class="profile-handle" id="profileHandle">@ireyhye</p>
      </div>
    </div>

    <!-- 개인정보 수정 카드 -->
    <div class="card">
      <p class="card-title">개인정보 수정</p>

      <div class="field-group">
        <label class="field-label" for="profileImageInput">프로필 사진</label>
        <input type="file" id="profileImageInput" accept="image/*" />
      </div>

      <div class="field-group">
        <label class="field-label" for="nicknameInput">닉네임</label>
        <div class="field-with-button">
          <input type="text" id="nicknameInput" value="김혜리" />
          <button type="button" class="btn-secondary btn-auto" id="checkNicknameBtn">중복확인</button>
        </div>
        <p class="field-message" id="nicknameCheckMessage" hidden></p>
      </div>

      <div class="field-group">
        <label class="field-label" for="passwordInput">비밀번호</label>
        <input type="password" id="passwordInput" placeholder="새 비밀번호를 입력하세요" />
      </div>

      <div class="card-footer">
        <button class="btn-primary btn-auto" id="saveBtn">저장하기</button>
      </div>

    </div>

    <!-- 계좌 삭제 (Danger Zone) -->
    <div class="card danger-card">
      <p class="card-title danger-title">계좌 삭제</p>
      <p class="card-caption danger-desc">계좌를 삭제하면 보유 주식, 거래 내역, 친구 목록이 모두 사라지고 되돌릴 수 없어요.</p>
      <div class="card-footer">
        <button class="btn-danger" id="deleteAccountBtn">계좌 삭제하기</button>
      </div>
    </div>

  </main>

  <script src="js/navbar.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
