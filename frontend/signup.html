<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>야르 - 회원가입</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">

  <div class="login-card">
    <h1 class="login-title">회원가입</h1>
    <p class="login-subtitle">계정을 만들고 시작해봐요</p>

    <form class="login-form" id="signupForm">
      <div class="field-group">
        <label class="field-label" for="nickname">닉네임</label>
        <div class="field-with-button">
          <input type="text" id="nickname" placeholder="화면에 표시될 이름을 입력해주세요" />
          <button type="button" class="btn-secondary btn-auto" id="checkNicknameBtn">중복확인</button>
        </div>
        <p class="field-message" id="nicknameCheckMessage" hidden></p>
      </div>

      <div class="field-group">
        <label class="field-label" for="userId">아이디</label>
        <div class="field-with-button">
          <input type="text" id="userId" placeholder="로그인시 사용할 아이디를 입력해주세요" />
          <button type="button" class="btn-secondary btn-auto" id="checkUserIdBtn">중복확인</button>
        </div>
        <p class="field-message" id="userIdCheckMessage" hidden></p>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">비밀번호</label>
        <input type="password" id="password" placeholder="8자 이상 입력해주세요" />
      </div>

      <div class="field-group">
        <label class="field-label" for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" placeholder="다시 한 번 입력해주세요" />
        <p class="field-error" id="passwordError" hidden>비밀번호가 일치하지 않아요</p>
      </div>

      <button type="submit" class="btn-primary">회원가입 완료</button>
    </form>

    <p class="login-footer">
      이미 계정이 있으신가요?
      <a href="index.html">로그인</a>
    </p>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
