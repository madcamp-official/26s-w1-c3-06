<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>야르 - 주식 거래</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="page-container">

    <div class="page-header">
      <div>
        <p class="page-title">종목 둘러보기</p>
        <p class="page-subtitle">관심 있는 회사를 찾아보세요</p>
      </div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="회사 이름으로 찾아보세요" />
      </div>
    </div>

    <div class="card stock-list-card">
      <div class="table-header stock-table-header">
        <span>종목명</span>
        <span class="align-right">현재가</span>
        <span class="align-right">등락률</span>
      </div>

      <div id="stockList">
        <!-- 종목 목록: JS에서 API 응답으로 이 안을 채움 -->
      </div>
    </div>

  </main>

  <script src="js/date-utils.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/trading.js"></script>
</body>
</html>
