<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#747480"/>
    </marker>
    <style>
      text { font-family: Pretendard, "Noto Sans KR", sans-serif; fill: #24242b; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #73737e; }
      .section { font-size: 13px; font-weight: 700; fill: #5b5fef; }
      .node-title { font-size: 17px; font-weight: 700; }
      .node-route { font-size: 11px; fill: #777783; }
      .item { font-size: 14px; }
      .line { fill: none; stroke: #747480; stroke-width: 2; marker-end: url(#arrow); }
      .branch { fill: none; stroke: #b3b3bd; stroke-width: 1.7; }
      .shared-line { fill: none; stroke: #5b5fef; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .root { fill: #5b5fef; }
      .root-text { fill: white; font-size: 19px; font-weight: 700; }
      .page { fill: white; stroke: #dadae2; stroke-width: 2; }
      .auth { fill: #f6f5ff; stroke: #aaa7ff; stroke-width: 2; }
      .home { fill: #f3f8ff; stroke: #72a7ed; stroke-width: 2; }
      .trade { fill: #f2fbf7; stroke: #61b58c; stroke-width: 2; }
      .social { fill: #fff8ef; stroke: #dfaa58; stroke-width: 2; }
      .settings { fill: #fff4f5; stroke: #df7d87; stroke-width: 2; }
      .shared { fill: #f7f7fa; stroke: #9a9aa5; stroke-width: 2; }
      .divider { stroke: #e5e5ea; stroke-width: 1; }
